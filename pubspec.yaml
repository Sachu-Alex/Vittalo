name: vittalo
description: "Vittalo - AI-powered resale price estimator. Sell smarter, not cheaper."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # ML / TFLite
  tflite_flutter: ^0.12.1

  # Image Handling
  image_picker: ^1.1.2

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/vittalo_app_icon.png"
  adaptive_icon_background: "#FF8C00"
  adaptive_icon_foreground: "assets/images/vittalo_app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/

  # Custom fonts can be added here once files are placed in assets/fonts/
